<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="when you feel lightheaded and your mind is windy eat a potato, perhaps, or two.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sanitize.css@13.0.0/sanitize.min.css">
    <link rel="stylesheet" href="potato-styles.css">
    <title>potato</title>
</head>
<body>
    <header>
            <img class="wwweggies" alt="light-blue wwweggies logo" src="assets/wwweggies.svg"/>
            <button class="mode" aria-label="toggle dark mode">dark</button>
            <div class="direction"></div>
        <nav>
            <div class="menu-symbol"></div>
            <div class="menu-symbol"></div>
            <div class="menu-symbol"></div>
        </nav>
    </header>

    <main>
<div class="potato-container">
    <section id="cooking">
            <p class="word flower">mash</p>
    </section>

    <section id="preparation">
            <p class="word leaf boil">boil</p>
            <p class="word leaf bake">bake</p>
            <p class="word leaf roast">roast</p>
            <p class="word leaf fry">fry</p>
    </section>

    <section id="stem">
        <p class="word stem">chop it if you wanna</p>
    </section>

    <section id="potatoes">
        <p class="word tuber">potato</p>
        <p class="word tuber name">solanum tuberosum</p>
    </section>

    <section id="poem">
            <p class="word poem1">earthy</p>
            <p class="word poem2">pale</p>
            <p class="word poem3">warm blanket</p>
    </section>
</div>

    <section id="frame">
        <div id="framebody"></div>
    </section>

    </main>
    <footer></footer>
<script src="potato-script.js"></script>
</body>
</html>
